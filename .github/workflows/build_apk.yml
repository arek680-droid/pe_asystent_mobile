name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Pozwala na ręczne uruchomienie budowania w panelu GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu z repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Konfiguracja Javy (wymaganej do zbudowania aplikacji na Androida)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Konfiguracja Fluttera
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3.5. Utworzenie pliku konfiguracyjnego z GitHub Secrets
      - name: Create Supabase Config
        run: |
          mkdir -p lib/core
          echo "class SupabaseConfig {" > lib/core/supabase_client.dart
          echo "  static const String url = '${{ secrets.SUPABASE_URL }}';" >> lib/core/supabase_client.dart
          echo "  static const String anonKey = '${{ secrets.SUPABASE_ANON_KEY }}';" >> lib/core/supabase_client.dart
          echo "}" >> lib/core/supabase_client.dart

      # 4. Pobranie bibliotek projektu
      - name: Install dependencies
        run: flutter pub get

      # 5. Zbudowanie pliku APK (wersja debug, najszybsza do testów)
      - name: Build APK
        run: flutter build apk --debug --build-number=${{ github.run_number }}

      # 7. Udostępnienie pliku APK do pobrania jako "Artifact" na GitHubie (jako kopia zapasowa)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pe-asystent-mobile-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # 8. Automatyczne utworzenie/aktualizacja wydania (Release) na GitHubie z plikiem APK
      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Wersja v${{ github.run_number }}
          body: |
            Automatycznie skompilowana wersja v${{ github.run_number }} aplikacji PE Asystent Mobile.
            
            Pobierz plik `app-debug.apk` poniżej bezpośrednio na swój telefon, aby go zainstalować/zaktualizować.
          files: build/app/outputs/flutter-apk/app-debug.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
