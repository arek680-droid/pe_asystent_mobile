name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Pozwala na ręczne uruchomienie budowania w panelu GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu z repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Konfiguracja Javy (wymaganej do zbudowania aplikacji na Androida)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Konfiguracja Fluttera
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Pobranie bibliotek projektu
      - name: Install dependencies
        run: flutter pub get

      # 5. Wygenerowanie tymczasowego klucza podpisującego wewnątrz projektu (zapobiega błędowi validateSigningDebug)
      - name: Generate Debug Keystore
        run: |
          echo "yes" | keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # 6. Zbudowanie pliku APK (wersja debug, najszybsza do testów)
      - name: Build APK
        run: flutter build apk --debug

      # 6. Udostępnienie pliku APK do pobrania jako "Artifact" na GitHubie
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pe-asystent-mobile-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7 # Plik będzie dostępny do pobrania przez 7 dni
